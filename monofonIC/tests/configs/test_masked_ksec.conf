#########################################################################################
# Masked-SC + baryons k-section path for the slab-vs-ksec consistency test.
# Pairs with test_masked_slab.conf (UseKSectionParticles=no).
# Exercises masked-SC (lattice_type=-2), mask_type=3 (full edges+faces),
# per-particle Masses dataset on both PartType0 and PartType1.
#########################################################################################

[setup]
GridRes              = 32
BoxLength            = 100
zstart               = 50.0
LPTorder             = 2
DoBaryons            = yes
DoBaryonVrel         = no
DoFixing             = no
DoInversion          = no
DoRemoveCornerModes  = no
ParticleLoad         = masked
ParticleMaskType     = 3
UseKSectionParticles = yes

[cosmology]
ParameterSet  = Planck2018EE+BAO+SN
ZeroRadiation = false
transfer      = eisenstein

[random]
generator = NGENIC
seed      = 12345

[execution]
NumThreads = 1

[output]
format     = gadget_hdf5
filename   = test_masked_ksec.hdf5
UseLongids = true
