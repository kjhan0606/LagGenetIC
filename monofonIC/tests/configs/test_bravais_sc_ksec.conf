#########################################################################################
# Bravais SC k-section path for the slab-vs-ksec consistency test.
# Pairs with test_bravais_sc_slab.conf (UseKSectionParticles=no).
#########################################################################################

[setup]
GridRes              = 32
BoxLength            = 100
zstart               = 50.0
LPTorder             = 2
DoBaryons            = no
DoBaryonVrel         = no
DoFixing             = no
DoInversion          = no
DoRemoveCornerModes  = no
ParticleLoad         = sc
UseKSectionParticles = yes

[cosmology]
ParameterSet  = Planck2018EE+BAO+SN
ZeroRadiation = false
transfer      = eisenstein

[random]
generator = NGENIC
seed      = 12345

[execution]
NumThreads = 1

[output]
format     = gadget_hdf5
filename   = test_bravais_sc_ksec.hdf5
UseLongids = true
