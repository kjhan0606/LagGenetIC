#########################################################################################
# Bravais BCC + baryons slab reference for the slab-vs-ksec consistency test.
# Pairs with test_bravais_bcc_baryons_ksec.conf (UseKSectionParticles=yes).
# Exercises the dual-particle-type (PartType0 + PartType1) ksec dispatch.
#########################################################################################

[setup]
GridRes              = 32
BoxLength            = 100
zstart               = 50.0
LPTorder             = 2
DoBaryons            = yes
DoBaryonVrel         = no
DoFixing             = no
DoInversion          = no
DoRemoveCornerModes  = no
ParticleLoad         = bcc
UseKSectionParticles = no

[cosmology]
ParameterSet  = Planck2018EE+BAO+SN
ZeroRadiation = false
transfer      = eisenstein

[random]
generator = NGENIC
seed      = 12345

[execution]
NumThreads = 1

[output]
format     = gadget_hdf5
filename   = test_bravais_bcc_baryons_slab.hdf5
UseLongids = true
