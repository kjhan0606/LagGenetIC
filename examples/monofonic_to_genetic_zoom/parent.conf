#########################################################################################
# End-to-end zoom hand-off test: monofonIC parent box -> white-noise dump
# Small/fast config (64^3, eisenstein transfer, LPT1). The WN dump is the
# only thing this run exists for; the full IC output is incidental.
#########################################################################################
[setup]
GridRes         = 64
BoxLength       = 64        # Mpc/h -> 1 Mpc/h per cell, matches GenetIC base_grid 64.0 64
zstart          = 49.0
LPTorder        = 1
DoBaryons       = no
ParticleLoad    = sc

# Local extension: dump the bare real-space white noise for GenetIC hand-off.
DumpWhiteNoise    = yes
WhiteNoiseFile    = wn.h5
WhiteNoiseDataset = WhiteNoise

[cosmology]
ParameterSet    = Planck2018EE+BAO+SN
ZeroRadiation   = true
transfer        = eisenstein

[random]
generator      = NGENIC
seed           = 12345

[execution]
NumThreads      = 4

[output]
format          = grafic2
filename        = parent_ics_ramses
