#########################################################################################
# Glass-lattice k-section path: ParticleLoad=glass, UseKSectionParticles=yes.
# Pairs with test_glass_slab.conf for the slab-vs-ksec glass consistency test.
# Requires glass64.hdf5 in the working directory (generated by make_glass.py).
#########################################################################################

[setup]
GridRes              = 32
BoxLength            = 100
zstart               = 50.0
LPTorder             = 2
DoBaryons            = no
DoBaryonVrel         = no
DoFixing             = no
DoInversion          = no
DoRemoveCornerModes  = no
ParticleLoad         = glass
GlassFileName        = glass64.hdf5
GlassTiles           = 8
UseKSectionParticles = yes

[cosmology]
ParameterSet  = Planck2018EE+BAO+SN
ZeroRadiation = false
transfer      = eisenstein

[random]
generator = NGENIC
seed      = 12345

[execution]
NumThreads = 1

[output]
format   = gadget_hdf5
filename = test_glass_ksec.hdf5
