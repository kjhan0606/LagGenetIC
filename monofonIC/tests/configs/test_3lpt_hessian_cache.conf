#########################################################################################
# Hessian cache consistency: small LPT3 base config. The wrapper rewrites
# the EnableHessianCache / HessianCacheBudgetGB lines below per variant and
# overrides [output] filename.
#########################################################################################

[setup]
GridRes             = 32
BoxLength           = 100
zstart              = 50.0
LPTorder            = 3
DoBaryons           = no
DoBaryonVrel        = no
DoFixing            = no
DoInversion         = no
DoRemoveCornerModes = no
ParticleLoad        = sc
EnableHessianCache   = no
HessianCacheBudgetGB = 0.0

[cosmology]
ParameterSet  = Planck2018EE+BAO+SN
ZeroRadiation = false
transfer      = eisenstein

[random]
generator = NGENIC
seed      = 12345

[execution]
NumThreads = 1

[output]
format     = gadget_hdf5
filename   = test_3lpt_hessian_cache.hdf5
UseLongids = true
